<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>股票持仓可视化工具</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-chart-sunburst@4"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #1a2a6c, #b21f1f, #fdbb2d);
            color: #333;
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        
        header {
            text-align: center;
            padding: 30px 0;
            color: white;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
        }
        
        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }
        
        .subtitle {
            font-size: 1.2rem;
            opacity: 0.9;
        }
        
        .app-container {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            margin-top: 20px;
            flex: 1;
        }
        
        .input-section {
            flex: 1;
            min-width: 300px;
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        
        .chart-section {
            flex: 2;
            min-width: 300px;
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            display: flex;
            flex-direction: column;
        }
        
        .section-title {
            font-size: 1.5rem;
            margin-bottom: 20px;
            color: #1a2a6c;
            border-bottom: 2px solid #fdbb2d;
            padding-bottom: 10px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #555;
        }
        
        input, select, textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        
        input:focus, select:focus, textarea:focus {
            border-color: #1a2a6c;
            outline: none;
        }
        
        .btn {
            background: linear-gradient(to right, #1a2a6c, #b21f1f);
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            transition: transform 0.2s, box-shadow 0.2s;
            display: block;
            width: 100%;
            margin-top: 10px;
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        
        .btn-secondary {
            background: linear-gradient(to right, #555, #777);
        }
        
        .btn-danger {
            background: linear-gradient(to right, #b21f1f, #d9534f);
        }
        
        .btn-info {
            background: linear-gradient(to right, #17a2b8, #138496);
        }
        
        .holdings-list {
            margin-top: 20px;
            max-height: 300px;
            overflow-y: auto;
            border: 1px solid #eee;
            border-radius: 8px;
            padding: 10px;
        }
        
        .holding-item {
            display: flex;
            justify-content: space-between;
            padding: 12px;
            border-bottom: 1px solid #eee;
            align-items: center;
        }
        
        .holding-item:last-child {
            border-bottom: none;
        }
        
        .holding-info {
            flex: 1;
        }
        
        .holding-symbol {
            font-weight: bold;
            color: #1a2a6c;
        }
        
        .holding-details {
            font-size: 0.9rem;
            color: #666;
        }
        
        .action-buttons {
            display: flex;
            gap: 5px;
        }
        
        .action-btn {
            background: #6c757d;
            color: white;
            border: none;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            cursor: pointer;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .edit-btn {
            background: #17a2b8;
        }
        
        .delete-btn {
            background: #d9534f;
        }
        
        .chart-container {
            flex: 1;
            min-height: 500px;
            position: relative;
        }
        
        .summary {
            margin-top: 20px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 8px;
            font-size: 1.1rem;
        }
        
        .summary-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
        }
        
        .summary-value {
            font-weight: bold;
            color: #1a2a6c;
        }
        
        .no-data {
            text-align: center;
            padding: 50px 0;
            color: #777;
            font-style: italic;
        }
        
        .group-section {
            margin-top: 30px;
        }
        
        .group-list {
            margin-top: 10px;
            max-height: 200px;
            overflow-y: auto;
            border: 1px solid #eee;
            border-radius: 8px;
            padding: 10px;
        }
        
        .group-item {
            display: flex;
            justify-content: space-between;
            padding: 10px;
            border-bottom: 1px solid #eee;
            align-items: center;
        }
        
        .group-item:last-child {
            border-bottom: none;
        }
        
        .group-name {
            font-weight: bold;
            color: #1a2a6c;
        }
        
        .group-stocks {
            font-size: 0.9rem;
            color: #666;
        }
        
        .view-toggle {
            display: flex;
            margin-bottom: 15px;
            gap: 10px;
        }
        
        .toggle-btn {
            flex: 1;
            padding: 8px;
            background: #e9ecef;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
        }
        
        .toggle-btn.active {
            background: #1a2a6c;
            color: white;
        }
        
        footer {
            text-align: center;
            margin-top: 30px;
            color: white;
            padding: 20px;
            font-size: 0.9rem;
            opacity: 0.8;
        }
        
        @media (max-width: 768px) {
            .app-container {
                flex-direction: column;
            }
            
            h1 {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>股票持仓可视化工具</h1>
            <p class="subtitle">添加您的持仓数据和分组，生成饼图展示</p>
        </header>
        
        <div class="app-container">
            <div class="input-section">
                <h2 class="section-title">添加持仓</h2>
                <div class="form-group">
                    <label for="stockSymbol">股票名称/代码</label>
                    <input type="text" id="stockSymbol" placeholder="例如：AAPL" required>
                </div>
                
                <div class="form-group">
                    <label for="value">持仓市值 (USD)</label>
                    <input type="number" id="value" placeholder="例如：15000.00" step="0.01" min="0.01" required>
                </div>
                
                <button id="addBtn" class="btn">添加持仓</button>
                <button id="clearBtn" class="btn btn-danger">清除所有持仓</button>
                
                <h2 class="section-title" style="margin-top: 30px;">我的持仓</h2>
                <div class="holdings-list" id="holdingsList">
                    <!-- 持仓列表将通过JS动态生成 -->
                </div>
                
                <div class="group-section">
                    <h2 class="section-title">分组管理</h2>
                    <div class="form-group">
                        <label for="groupName">分组名称</label>
                        <input type="text" id="groupName" placeholder="例如：科技股">
                    </div>
                    
                    <div class="form-group">
                        <label for="groupColor">分组颜色</label>
                        <input type="color" id="groupColor" value="#1a2a6c">
                    </div>
                    
                    <div class="form-group">
                        <label for="groupStocks">选择股票</label>
                        <select id="groupStocks" multiple style="height: 100px;">
                            <!-- 股票选项将通过JS动态生成 -->
                        </select>
                    </div>
                    
                    <button id="addGroupBtn" class="btn btn-info">添加分组</button>
                    
                    <h2 class="section-title" style="margin-top: 20px;">我的分组</h2>
                    <div class="group-list" id="groupList">
                        <!-- 分组列表将通过JS动态生成 -->
                    </div>
                </div>
            </div>
            
            <div class="chart-section">
                <div class="view-toggle">
                    <button id="stockViewBtn" class="toggle-btn active">按股票查看</button>
                    <button id="groupViewBtn" class="toggle-btn">按分组查看</button>
                    <button id="doubleViewBtn" class="toggle-btn">旭日图</button>
                </div>
                
                <h2 class="section-title">持仓分布</h2>
                <div class="chart-container">
                    <canvas id="pieChart"></canvas>
                </div>
                
                <div class="summary">
                    <div class="summary-item">
                        <span>总持仓价值:</span>
                        <span id="totalValue" class="summary-value">$0.00</span>
                    </div>
                    <div class="summary-item">
                        <span>持仓股票数量:</span>
                        <span id="stockCount" class="summary-value">0</span>
                    </div>
                    <div class="summary-item">
                        <span>分组数量:</span>
                        <span id="groupCount" class="summary-value">0</span>
                    </div>
                </div>
            </div>
        </div>
        
        <footer>
            <p>© 2023 股票持仓可视化工具 | 数据保存在您的浏览器本地存储中</p>
        </footer>
    </div>

    <script>
        // 从localStorage加载持仓数据和分组数据
        let holdings = JSON.parse(localStorage.getItem('stockHoldings')) || [];
        let groups = JSON.parse(localStorage.getItem('stockGroups')) || [];
        let pieChart = null;
        let currentView = 'stock'; // 'stock', 'group' 或 'double'
        
        // DOM元素
        const stockSymbolInput = document.getElementById('stockSymbol');
        const valueInput = document.getElementById('value');
        const addBtn = document.getElementById('addBtn');
        const clearBtn = document.getElementById('clearBtn');
        const holdingsList = document.getElementById('holdingsList');
        const pieChartCanvas = document.getElementById('pieChart');
        const totalValueEl = document.getElementById('totalValue');
        const stockCountEl = document.getElementById('stockCount');
        const groupCountEl = document.getElementById('groupCount');
        const groupNameInput = document.getElementById('groupName');
        const groupColorInput = document.getElementById('groupColor');
        const groupStocksSelect = document.getElementById('groupStocks');
        const addGroupBtn = document.getElementById('addGroupBtn');
        const groupList = document.getElementById('groupList');
        const stockViewBtn = document.getElementById('stockViewBtn');
        const groupViewBtn = document.getElementById('groupViewBtn');
        const doubleViewBtn = document.getElementById('doubleViewBtn');
        
        // 初始化
        document.addEventListener('DOMContentLoaded', function() {
            renderHoldingsList();
            renderGroupList();
            updateGroupStocksSelect();
            updateChart();
            updateSummary();
            
            // 设置视图切换按钮事件
            stockViewBtn.addEventListener('click', function() {
                currentView = 'stock';
                updateActiveViewButtons();
                updateChart();
            });
            
            groupViewBtn.addEventListener('click', function() {
                currentView = 'group';
                updateActiveViewButtons();
                updateChart();
            });
            
            doubleViewBtn.addEventListener('click', function() {
                currentView = 'double';
                updateActiveViewButtons();
                updateChart();
            });
        });
        
        // 更新活动视图按钮样式
        function updateActiveViewButtons() {
            stockViewBtn.classList.toggle('active', currentView === 'stock');
            groupViewBtn.classList.toggle('active', currentView === 'group');
            doubleViewBtn.classList.toggle('active', currentView === 'double');
        }
        
        // 添加持仓
        addBtn.addEventListener('click', function() {
            const symbol = stockSymbolInput.value.trim().toUpperCase();
            const value = parseFloat(valueInput.value);
            
            if (!symbol || isNaN(value) || value <= 0) {
                alert('请填写所有字段并确保数值有效');
                return;
            }
            
            // 检查是否已存在相同名称的持仓
            const existingIndex = holdings.findIndex(h => h.symbol === symbol);
            if (existingIndex !== -1) {
                // 更新现有持仓
                holdings[existingIndex].value += value;
            } else {
                // 添加新持仓
                holdings.push({
                    symbol,
                    value
                });
            }
            
            // 保存到localStorage
            saveHoldings();
            
            // 更新UI
            renderHoldingsList();
            updateGroupStocksSelect();
            updateChart();
            updateSummary();
            
            // 清空表单
            stockSymbolInput.value = '';
            valueInput.value = '';
            stockSymbolInput.focus();
        });
        
        // 清除所有持仓
        clearBtn.addEventListener('click', function() {
            if (confirm('确定要清除所有持仓数据吗？此操作不可撤销。')) {
                holdings = [];
                groups = [];
                saveHoldings();
                saveGroups();
                renderHoldingsList();
                renderGroupList();
                updateGroupStocksSelect();
                updateChart();
                updateSummary();
            }
        });
        
        // 添加分组
        addGroupBtn.addEventListener('click', function() {
            const name = groupNameInput.value.trim();
            const color = groupColorInput.value;
            const selectedStocks = Array.from(groupStocksSelect.selectedOptions).map(option => option.value);
            
            if (!name) {
                alert('请输入分组名称');
                return;
            }
            
            // 检查分组名称是否唯一
            if (groups.some(group => group.name === name)) {
                alert('分组名称已存在');
                return;
            }
            
            // 添加新分组
            groups.push({
                id: generateId(),
                name,
                color,
                stocks: selectedStocks
            });
            
            // 保存到localStorage
            saveGroups();
            
            // 更新UI
            renderGroupList();
            updateChart();
            updateSummary();
            
            // 清空表单
            groupNameInput.value = '';
            groupColorInput.value = '#1a2a6c';
            groupStocksSelect.selectedIndex = -1;
        });
        
        // 生成唯一ID
        function generateId() {
            return Date.now().toString(36) + Math.random().toString(36).substr(2);
        }
        
        // 保存持仓到localStorage
        function saveHoldings() {
            localStorage.setItem('stockHoldings', JSON.stringify(holdings));
        }
        
        // 保存分组到localStorage
        function saveGroups() {
            localStorage.setItem('stockGroups', JSON.stringify(groups));
        }
        
        // 渲染持仓列表
        function renderHoldingsList() {
            holdingsList.innerHTML = '';
            
            if (holdings.length === 0) {
                holdingsList.innerHTML = '<div class="no-data">暂无持仓数据</div>';
                return;
            }
            
            holdings.forEach((holding, index) => {
                const holdingEl = document.createElement('div');
                holdingEl.className = 'holding-item';
                holdingEl.innerHTML = `
                    <div class="holding-info">
                        <div class="holding-symbol">${holding.symbol}</div>
                        <div class="holding-details">$${holding.value.toFixed(2)}</div>
                    </div>
                    <div class="action-buttons">
                        <button class="action-btn edit-btn" data-index="${index}">✏️</button>
                        <button class="action-btn delete-btn" data-index="${index}">×</button>
                    </div>
                `;
                holdingsList.appendChild(holdingEl);
            });
            
            // 添加删除事件监听器
            document.querySelectorAll('.delete-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    const index = parseInt(this.getAttribute('data-index'));
                    holdings.splice(index, 1);
                    saveHoldings();
                    renderHoldingsList();
                    updateGroupStocksSelect();
                    updateChart();
                    updateSummary();
                });
            });
            
            // 添加编辑事件监听器
            document.querySelectorAll('.edit-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    const index = parseInt(this.getAttribute('data-index'));
                    openEditModal(index);
                });
            });
        }
        
        // 渲染分组列表
        function renderGroupList() {
            groupList.innerHTML = '';
            
            if (groups.length === 0) {
                groupList.innerHTML = '<div class="no-data">暂无分组数据</div>';
                return;
            }
            
            groups.forEach((group, index) => {
                const groupEl = document.createElement('div');
                groupEl.className = 'group-item';
                
                // 获取分组中的股票名称
                const stockNames = group.stocks.map(symbol => {
                    const holding = holdings.find(h => h.symbol === symbol);
                    return holding ? holding.symbol : symbol;
                }).join(', ');
                
                groupEl.innerHTML = `
                    <div>
                        <div class="group-name" style="color: ${group.color}">${group.name}</div>
                        <div class="group-stocks">${stockNames}</div>
                    </div>
                    <div class="action-buttons">
                        <button class="action-btn edit-btn" data-index="${index}">✏️</button>
                        <button class="action-btn delete-btn" data-index="${index}">×</button>
                    </div>
                `;
                groupList.appendChild(groupEl);
            });
            
            // 添加删除事件监听器
            document.querySelectorAll('.delete-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    const index = parseInt(this.getAttribute('data-index'));
                    groups.splice(index, 1);
                    saveGroups();
                    renderGroupList();
                    updateChart();
                    updateSummary();
                });
            });
            
            // 添加编辑事件监听器
            document.querySelectorAll('.edit-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    const index = parseInt(this.getAttribute('data-index'));
                    openEditGroupModal(index);
                });
            });
        }
        
        // 更新分组选择框中的股票选项
        function updateGroupStocksSelect() {
            groupStocksSelect.innerHTML = '';
            
            holdings.forEach(holding => {
                const option = document.createElement('option');
                option.value = holding.symbol;
                option.textContent = `${holding.symbol} ($${holding.value.toFixed(2)})`;
                groupStocksSelect.appendChild(option);
            });
        }
        
        // 打开编辑持仓模态框
        function openEditModal(index) {
            const holding = holdings[index];
            
            const symbol = prompt("修改股票代码:", holding.symbol);
            const value = parseFloat(prompt("修改持仓市值:", holding.value));
            
            if (symbol && !isNaN(value) && value > 0) {
                holding.symbol = symbol;
                holding.value = value;
                saveHoldings();
                renderHoldingsList();
                updateGroupStocksSelect();
                renderGroupList();
                updateChart();
                updateSummary();
            }
        }
        
        // 打开编辑分组模态框
        function openEditGroupModal(index) {
            const group = groups[index];
            
            const name = prompt("修改分组名称:", group.name);
            if (!name) return;
            
            const symbols = prompt("修改股票代码(用逗号分隔):", group.stocks.join(","));
            if (symbols !== null) {
                group.stocks = symbols.split(",").map(s => s.trim()).filter(s => s.length > 0);
                group.name = name;
                saveGroups();
                renderGroupList();
                updateChart();
                updateSummary();
            }
        }
        
        // 计算分组价值
        function calculateGroupValue(group) {
            let value = 0;
            
            // 计算分组内股票的价值
            group.stocks.forEach(symbol => {
                const holding = holdings.find(h => h.symbol === symbol);
                if (holding) {
                    value += holding.value;
                }
            });
            
            return value;
        }
        
        // 获取未分组的股票
        function getUngroupedStocks() {
            return holdings.filter(holding => {
                return !groups.some(group => group.stocks.includes(holding.symbol));
            });
        }
        
        // 更新饼图
        function updateChart() {
            const ctx = pieChartCanvas.getContext('2d');
            
            if (pieChart) {
                pieChart.destroy();
            }
            
            if (holdings.length === 0) {
                // 没有数据时显示提示
                ctx.fillStyle = '#777';
                ctx.font = '20px Arial';
                ctx.textAlign = 'center';
                ctx.fillText('暂无持仓数据', pieChartCanvas.width/2, pieChartCanvas.height/2);
                return;
            }
            
            // 准备图表数据
            let labels, datasets;
            
            if (currentView === 'stock') {
                // 按股票显示
                labels = holdings.map(h => h.symbol);
                const values = holdings.map(h => h.value);
                const backgroundColors = generateColors(holdings.length);
                
                pieChart = new Chart(ctx, {
                    type: 'pie',
                    data: {
                        labels: labels,
                        datasets: [{
                            data: values,
                            backgroundColor: backgroundColors,
                            borderWidth: 1
                        }]
                    },
                    options: getChartOptions('股票持仓分布')
                });
            } 
            else if (currentView === 'group') {
                // 按分组显示
                const ungroupedStocks = getUngroupedStocks();
                
                // 准备标签和数据
                labels = [];
                const values = [];
                const backgroundColors = [];
                
                // 添加分组数据
                groups.forEach(group => {
                    const groupValue = calculateGroupValue(group);
                    if (groupValue > 0) {
                        labels.push(group.name);
                        values.push(groupValue);
                        backgroundColors.push(group.color);
                    }
                });
                
                // 添加未分组股票（每个股票单独显示）
                ungroupedStocks.forEach(stock => {
                    labels.push(stock.symbol);
                    values.push(stock.value);
                    backgroundColors.push('#cccccc');
                });
                
                pieChart = new Chart(ctx, {
                    type: 'pie',
                    data: {
                        labels: labels,
                        datasets: [{
                            data: values,
                            backgroundColor: backgroundColors,
                            borderWidth: 1
                        }]
                    },
                    options: getChartOptions('分组持仓分布')
                });
            }
            else if (currentView === 'double') {
                // 旭日图显示
                // 准备旭日图数据
                const sunburstData = prepareSunburstData();
                
                if (sunburstData.children.length === 0) {
                    ctx.fillStyle = '#777';
                    ctx.font = '20px Arial';
                    ctx.textAlign = 'center';
                    ctx.fillText('暂无有效数据', pieChartCanvas.width/2, pieChartCanvas.height/2);
                    return;
                }
                
                pieChart = new Chart(ctx, {
                    type: 'sunburst',
                    data: {
                        datasets: [{
                            tree: sunburstData.children,
                            key: 'value',
                            groups: ['name']
                        }]
                    },
                    options: getChartOptions('持仓旭日图', true)
                });
            }
        }
        
        // 准备旭日图数据
        function prepareSunburstData() {
            const result = {
                children: []
            };
            
            // 1. 处理分组
            groups.forEach(group => {
                const groupValue = calculateGroupValue(group);
                if (groupValue > 0) {
                    const groupNode = {
                        name: group.name,
                        value: groupValue,
                        color: group.color,
                        children: []
                    };
                    
                    // 添加分组内的股票
                    group.stocks.forEach(symbol => {
                        const holding = holdings.find(h => h.symbol === symbol);
                        if (holding) {
                            groupNode.children.push({
                                name: holding.symbol,
                                value: holding.value,
                                color: lightenColor(group.color, 30)
                            });
                        }
                    });
                    
                    result.children.push(groupNode);
                }
            });
            
            // 2. 处理未分组的股票
            const ungroupedStocks = getUngroupedStocks();
            
            ungroupedStocks.forEach(stock => {
                result.children.push({
                    name: stock.symbol,
                    value: stock.value,
                    color: '#cccccc'
                });
            });
            
            return result;
        }
        
        // 获取图表配置选项
        function getChartOptions(title, isSunburst = false) {
            return {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    title: {
                        display: true,
                        text: title,
                        font: {
                            size: 18
                        }
                    },
                    legend: {
                        position: 'right',
                        labels: {
                            font: {
                                size: 14
                            },
                            padding: 15
                        }
                    },
                    tooltip: {
                        callbacks: {
                            label: function(context) {
                                const value = context.raw.value || context.raw;
                                const total = context.chart.data.datasets[0].data.reduce((sum, dataset) => {
                                    return sum + dataset.reduce((a, b) => a + b, 0);
                                }, 0);
                                const percentage = Math.round((value / total) * 100);
                                return `${context.label}: $${value.toFixed(2)} (${percentage}%)`;
                            }
                        }
                    }
                }
            };
        }
        
        // 生成随机颜色
        function generateColors(count) {
            const colors = [];
            const hueStep = 360 / count;
            
            for (let i = 0; i < count; i++) {
                const hue = i * hueStep;
                colors.push(`hsl(${hue}, 70%, 60%)`);
            }
            
            return colors;
        }
        
        // 颜色变浅函数
        function lightenColor(color, percent) {
            // 处理十六进制颜色
            if (color.startsWith('#')) {
                let r = parseInt(color.substring(1, 3), 16);
                let g = parseInt(color.substring(3, 5), 16);
                let b = parseInt(color.substring(5, 7), 16);
                
                r = Math.min(255, r + (255 - r) * percent / 100);
                g = Math.min(255, g + (255 - g) * percent / 100);
                b = Math.min(255, b + (255 - b) * percent / 100);
                
                return `#${Math.round(r).toString(16).padStart(2, '0')}${Math.round(g).toString(16).padStart(2, '0')}${Math.round(b).toString(16).padStart(2, '0')}`;
            }
            
            // 处理HSL颜色
            if (color.startsWith('hsl')) {
                const match = color.match(/hsl\((\d+),\s*([\d.]+)%,\s*([\d.]+)%\)/);
                if (match) {
                    const h = parseInt(match[1]);
                    const s = parseFloat(match[2]);
                    let l = parseFloat(match[3]);
                    
                    l = Math.min(100, l + (100 - l) * percent / 100);
                    
                    return `hsl(${h}, ${s}%, ${l}%)`;
                }
            }
            
            return color; // 无法处理则返回原色
        }
        
        // 更新摘要信息
        function updateSummary() {
            const totalValue = holdings.reduce((sum, h) => sum + h.value, 0);
            const stockCount = holdings.length;
            const groupCount = groups.length;
            
            totalValueEl.textContent = `$${totalValue.toFixed(2)}`;
            stockCountEl.textContent = stockCount;
            groupCountEl.textContent = groupCount;
        }
    </script>
</body>
